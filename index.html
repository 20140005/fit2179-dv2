<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Can Students Still Afford Australian Cities?</title>

    <!-- Vega Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <h1>Can Students Still Afford Australian Cities?</h1>

    <div id="map_vis"></div>
    <div id="bubble_vis"></div>
    <div id="line_vis"></div>
    <div id="heatmap_vis"></div>
    <div id="hours_vis"></div>
    <div id="radial_vis"></div>
    <div id="slope_vis"></div>
    <div id="bump_vis"></div>
    <div id="stream_vis"></div>

    <script>
        vegaEmbed("#map_vis", "vega/affordability_map.vg.json");
        vegaEmbed("#bubble_vis", "vega/bubble_map.vg.json");
        vegaEmbed("#line_vis", "vega/rent_line_chart.vg.json");
        vegaEmbed("#heatmap_vis", "vega/cost_heatmap.vg.json");
        vegaEmbed("#hours_vis", "vega/work_hours_chart.vg.json");
        vegaEmbed("#radial_vis", "vega/radial_budget_chart.vg.json");
        vegaEmbed("#slope_vis", "vega/rent_slope_chart.vg.json");
        vegaEmbed("#bump_vis", "vega/bump_chart.vg.json");
        vegaEmbed("#stream_vis", "vega/streamgraph.vg.json");
    </script>


</body>

</html>
